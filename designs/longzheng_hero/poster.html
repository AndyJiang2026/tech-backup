<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《长征·英雄》龙标电影海报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .poster-container {
            width: 800px;
            height: 1200px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #8B0000 0%, #C41E3A 30%, #8B0000 70%, #1a1a1a 100%);
        }
        
        /* 背景光效 */
        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
            z-index: 1;
        }
        
        /* 顶部龙标区域 */
        .dragon-badge {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
            padding: 15px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(255,215,0,0.5);
            z-index: 10;
        }
        
        .dragon-badge-text {
            color: #8B0000;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            text-align: center;
        }
        
        /* 主标题 */
        .main-title {
            position: absolute;
            top: 180px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }
        
        .main-title h1 {
            font-size: 120px;
            color: #FFD700;
            text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.5);
            font-family: "KaiTi", "STKaiti", serif;
            letter-spacing: 15px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 28px;
            color: #fff;
            letter-spacing: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        /* 中央视觉区域 - 雪山剪影 */
        .central-visual {
            position: absolute;
            top: 350px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 500px;
            z-index: 5;
        }
        
        .mountain-silhouette {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 300px;
            background: linear-gradient(180deg, transparent 0%, #1a1a1a 100%);
            clip-path: polygon(0% 100%, 15% 60%, 30% 80%, 45% 40%, 60% 70%, 75% 30%, 85% 60%, 100% 100%);
        }
        
        .red-army-figures {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
        }
        
        .figure {
            width: 60px;
            height: 120px;
            background: linear-gradient(180deg, #C41E3A 0%, #8B0000 100%);
            clip-path: polygon(50% 0%, 60% 20%, 55% 40%, 70% 100%, 30% 100%, 45% 40%, 40% 20%);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        
        /* VR 科技元素 */
        .vr-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            border: 3px solid rgba(255,215,0,0.3);
            border-radius: 50%;
            z-index: 3;
        }
        
        .vr-ring::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid rgba(255,215,0,0.2);
            border-radius: 50%;
        }
        
        /* 底部信息 */
        .bottom-info {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            width: 600px;
        }
        
        .platform-badge {
            background: linear-gradient(135deg, #C41E3A 0%, #8B0000 100%);
            color: #FFD700;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 20px;
            border: 2px solid #FFD700;
        }
        
        .credits {
            color: #ccc;
            font-size: 14px;
            line-height: 1.8;
            letter-spacing: 1px;
        }
        
        .credits-line {
            margin: 5px 0;
        }
        
        /* 装饰性五角星 */
        .star {
            position: absolute;
            color: #FFD700;
            font-size: 30px;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            z-index: 8;
        }
        
        .star-1 { top: 100px; left: 80px; }
        .star-2 { top: 120px; right: 100px; font-size: 20px; }
        .star-3 { bottom: 200px; left: 60px; font-size: 15px; }
        .star-4 { bottom: 180px; right: 80px; font-size: 25px; }
        
        /* 光线效果 */
        .light-ray {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 400px;
            background: linear-gradient(180deg, rgba(255,215,0,0.5) 0%, transparent 100%);
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="poster-container">
        <!-- 背景光效 -->
        <div class="glow-effect"></div>
        
        <!-- 光线效果 -->
        <div class="light-ray"></div>
        
        <!-- VR 科技环 -->
        <div class="vr-ring"></div>
        
        <!-- 装饰五角星 -->
        <div class="star star-1">★</div>
        <div class="star star-2">★</div>
        <div class="star star-3">★</div>
        <div class="star star-4">★</div>
        
        <!-- 龙标标识 -->
        <div class="dragon-badge">
            <div class="dragon-badge-text">🎬 国家电影局龙标审核通过</div>
        </div>
        
        <!-- 主标题 -->
        <div class="main-title">
            <h1>长征·英雄</h1>
            <div class="subtitle">VR 大空间数字体验电影</div>
        </div>
        
        <!-- 中央视觉 -->
        <div class="central-visual">
            <div class="mountain-silhouette"></div>
            <div class="red-army-figures">
                <div class="figure"></div>
                <div class="figure"></div>
                <div class="figure"></div>
            </div>
        </div>
        
        <!-- 底部信息 -->
        <div class="bottom-info">
            <div class="platform-badge">🇨🇳 学习强国推荐内容</div>
            <div class="credits">
                <div class="credits-line">出品方：强国小马数字科技有限公司</div>
                <div class="credits-line">技术支持：OpenClaw Agent Team</div>
                <div class="credits-line">VR 制作：沉浸式数字体验实验室</div>
                <div class="credits-line">2026 年 荣誉呈现</div>
            </div>
        </div>
    </div>
</body>
</html>
